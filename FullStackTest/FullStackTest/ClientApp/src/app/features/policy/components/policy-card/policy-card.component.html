<div class="policy-card"
  tabindex="0"
  [class.policy-card--selected]="isSelected()"
  (click)="selectedItem.emit()"
  (keydown.enter)="selectedItem.emit()"
  (keydown.space)="selectedItem.emit(); $event.preventDefault()">

  <div class="policy-card__header">
    <span class="policy-card__number">Policy #{{ policy().policyNumber }}</span>
    <span class="policy-card__badge">{{ genderLabel() }}</span>
  </div>

  <div class="policy-card__name">{{ policy().policyHolder.name }}</div>

  <hr class="policy-card__divider">

  <div class="policy-card__detail">
    <span class="policy-card__detail-label">Age</span>
    <span class="policy-card__detail-value">{{ policy().policyHolder.age }}</span>
  </div>

  <div class="policy-card__detail">
    <span class="policy-card__detail-label">Gender</span>
    <span class="policy-card__detail-value">{{ genderLabel() }}</span>
  </div>
</div>
